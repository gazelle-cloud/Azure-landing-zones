name: validate - knowledge graph decisions

on:
  push:
    branches-ignore:
      - main
    paths:
      - "knowledge-graph/decisions/*.json"
      - ".github/utils/confim-knowledge-graph-schema.ps1"
      - ".github/utils/confirm-knowledge-graph-integrity.ps1"
      - ".github/utils/confirm-knowledge-graph-semantic.ps1"
      - ".github/workflows/validate-knowledge-graph.yml"
  workflow_dispatch:
    inputs:
      validate_all:
        description: 'Validate all decisions'
        type: boolean
        default: false

permissions:
  contents: read
  models: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: validate schema
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File .github/utils/confim-knowledge-graph-schema.ps1

      - name: validate referential integrity
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File .github/utils/confirm-knowledge-graph-integrity.ps1

      - name: get changed decision files
        id: changed
        run: |
          if [ "${{ inputs.validate_all }}" = "true" ]; then
            files=$(echo knowledge-graph/decisions/*.json)
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            files=$(git diff --name-only --diff-filter=d origin/main HEAD -- 'knowledge-graph/decisions/*.json' | tr '\n' ' ')
          else
            files=$(git diff --name-only --diff-filter=d HEAD~1 HEAD -- 'knowledge-graph/decisions/*.json' | tr '\n' ' ')
          fi
          echo "files=$files" >> $GITHUB_OUTPUT

      - name: validate semantic decisions
        if: steps.changed.outputs.files != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File .github/utils/confirm-knowledge-graph-semantic.ps1 -Files ${{ steps.changed.outputs.files }}
