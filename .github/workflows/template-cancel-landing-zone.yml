name: template - cancel landing zone

on:
  workflow_dispatch:
    inputs:
      subscriptionId:
        description: "Subscription id"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  cancelLandingZone:
    runs-on: ${{ vars.RUNNER_IMAGE_VERSION }}
    environment: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: get github token
        id: github-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_GITHUB_AZUREPLATFORM_ID }}
          private-key: ${{ secrets.APP_GITHUB_AZUREPLATFORM_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_PLATFORM_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID}}
          allow-no-subscriptions: true

      - name: fetch landing zone name
        uses: azure/cli@v3
        with:
          inlineScript: |
            lzName=$(az account subscription show --id ${{ inputs.subscriptionId }} --query 'displayName' -o tsv)
            echo "LandingZoneName=$lzName" >> $GITHUB_ENV

      - name: cancel landing zone
        uses: azure/cli@v3
        with:
          azcliversion: ${{ vars.AZURE_CLI_VERSION }}
          inlineScript: |
            az rest --method POST --url 'https://management.azure.com/subscriptions/${{ inputs.subscriptionId }}/providers/Microsoft.Subscription/cancel?IgnoreResourceCheck=true&api-version=2024-08-01-preview'

      - name: disable landingzone workflow
        env:
          GH_TOKEN: ${{ steps.github-token.outputs.token }}
        run: |
          gh workflow disable 'lz - ${{ env.LandingZoneName }}'
